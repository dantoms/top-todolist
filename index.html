<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Todolist</title>
  <script defer src="main.js"></script></head>
  <body>
    <aside>
      <h1 id="app-name"><a href="/">modus.</a></h1>
      <h2 id="projects-heading">Projects</h2>
      <div id="projects"></div>
      <button id="new-project-btn">new project</button>
    </aside>
    <main>
      <button id="new-todo-btn" type="button">+ new todo</button>
      <section id="tasks">
        <h2 id="task-list-header">All Tasks</h2>
        <ul id="task-list">
          <li>No tasks to show</li>
        </ul>
      </section>
    </main>
    <dialog id="new-task-dialog">
      <h2>New Task</h2>
      <form id="new-task-form">
        <div class="form-row">
          <label for="title">Task: </label>
          <input type="text" id="title" name="title" />
        </div>
        <div class="form-row">
          <label for="priority">Priority: </label>
          <select name="priority" id="priority">
            <option value="high">High</option>
            <option value="med" selected="selected">Med</option>
            <option value="low">Low</option>
          </select>
        </div>
        <div class="form-row">
          <label for="due">Due Date: </label>
          <input type="date" name="due" id="due" />
        </div>
        <div class="form-row">
          <label for="project-select">Project: </label>
          <select name="project-select" id="project-select"></select>
        </div>
        <div class="form-row new-task-submit-row">
          <button type="submit" id="new-task-submit-btn">add task</button>
        </div>
      </form>
    </dialog>
  </body>
</html>
